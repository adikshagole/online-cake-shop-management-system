{% extends 'base.html' %}

{% block content %}
<h2 style="
    font-size:30px;
    font-family: 'Georgia', serif;
    color:white;
    margin-top:30px;
    text-shadow: 0 4px 10px rgba(0,0,0,0.3),
                 0 0 25px #ff60c8;">Add Menu Item</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <br><button type="submit" style="background:white; padding:14px 32px; border-radius:30px; 
              color:#d60075; font-weight:bold; border:2px solid #d60075;
              text-decoration:none;">Save</button>
</form>

{% comment %} <div class="btn-group"><br>
    <a href="/edit/{{ item.id }}/"
       style="padding:10px 20px; background:#ff66b3; color:white; 
       border-radius:12px; text-decoration:none; font-weight:600; 
       display:inline-block;">
       Edit
    </a>

    <a href="/delete/{{ item.id }}/"
       style="padding:10px 20px; background:#ff66b3; color:white; 
       border-radius:12px; text-decoration:none; font-weight:600; 
       display:inline-block;">
       Delete
    </a>
</div> {% endcomment %}

{% endblock %}
