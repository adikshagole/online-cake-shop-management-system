{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Cake Shop</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<nav class="navbar">
    <a href="/">Home</a>
    <a href="/about/">About Us</a>


    <span class="navbar-text d-flex gap-2"> 
            {% if user.is_authenticated %}
            <a class="btn btn-outline-danger" href="{% url "logout_page" %}">Logout</a>
            {% else %}
            <a class="btn btn-outline-success" href="{% url "register_page" %}">Sign In</a>
            {% endif %}

    </span>
</nav>


<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
