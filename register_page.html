{% extends "base.html" %}

{% block content  %}
<div class="container-fluid d-flex justify-content-center">
    <div class="card p-4 m-5 w-50 h-60 mx-auto">
        <h1 class="display-3 text-center mb-5">Registration Form</h1>
        {% if messages %}
        <div>
            {% for msg in messages  %}
            <div class="alert alert-danger">
                {{msg}}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form class="d-flex flex-column gap-2" method="POST">
            {% csrf_token %}
            <input class="form-control" name="username" type="text" placeholder="Enter Username"> <br><br>
            <input class="form-control" name="email" type="email" placeholder="Enter Email"> <br><br>
            <input class="form-control" name="password" type="password" placeholder="Enter Password"> <br><br>
            <input class="form-control" name="confirmed_password" type="password" placeholder="Enter Confirm Password"> <br><br>
            <button type="Submit" class="btn btn-sm btn-primary w-100 mt-3">Register</button>
        </form>

    </div>
</div>

{% endblock   %}
